<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno Digital Pro</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; margin: 0; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #28a745; color: white; }
        
        .seccion-titulo { font-size: 14px; color: #666; font-weight: bold; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .venta-item { background: white; padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .venta-item:last-child { border-bottom: none; }
        .precio-tag { color: #28a745; font-weight: bold; }
        
        .badge-total { background: #333; color: white; padding: 5px 10px; border-radius: 20px; font-size: 14px; float: right; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🛒 Nueva Venta</h3>
        <input type="text" id="producto" list="sugerencias" placeholder="¿Qué vendiste?" autocomplete="off">
        <datalist id="sugerencias"></datalist>
        <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
        
        <div id="carrito-temporal"></div>
        <button onclick="cerrarVenta()" id="btn-enviar" class="btn-green">✅ Finalizar Venta</button>
    </div>

    <div class="seccion-titulo">
        Ventas de Hoy 
        <span id="total-dia-badge" class="badge-total">$0</span>
    </div>
    
    <div id="lista-ventas-hoy" style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <div style="padding: 20px; color: #999; text-align: center;">Cargando bitácora...</div>
    </div>

    <script>
        let carrito = [];
        const urlScript = "https://script.google.com/macros/s/AKfycbxSWNT3D2VG3K6p9p0i6d6SVMUkQfZIkRINV2yb8UMAbupr49MPk7N78nyD8iRwrHqKww/exec"; 

        const inProd = document.getElementById('producto');
        const inPrec = document.getElementById('precio');

        window.onload = cargarDatos;

        function cargarDatos() {
            fetch(urlScript)
            .then(res => res.json())
            .then(data => {
                // 1. Llenar sugerencias
                document.getElementById('sugerencias').innerHTML = data.productos.map(p => `<option value="${p}">`).join('');
                
                // 2. Mostrar total acumulado
                document.getElementById('total-dia-badge').innerText = `Total: $${data.totalHoy}`;

                // 3. Mostrar lista de productos vendidos hoy
                if (data.detalleHoy.length > 0) {
                    document.getElementById('lista-ventas-hoy').innerHTML = data.detalleHoy.map(v => `
                        <div class="venta-item">
                            <span>${v.nombre}</span>
                            <span class="precio-tag">$${v.precio}</span>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('lista-ventas-hoy').innerHTML = '<div style="padding:20px; color:#ccc; text-align:center;">Aún no hay ventas hoy</div>';
                }
            });
        }

        inProd.addEventListener('input', () => {
            const opts = document.querySelectorAll('#sugerencias option');
            for (let o of opts) { if (o.value === inProd.value) { inPrec.focus(); break; } }
        });

        inPrec.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && inProd.value && inPrec.value) {
                carrito.push({ producto: inProd.value, precio: parseInt(inPrec.value), idVenta: Date.now() });
                dibujarCarrito();
                inProd.value = ""; inPrec.value = ""; inProd.focus();
            }
        });

        function dibujarCarrito() {
            document.getElementById('carrito-temporal').innerHTML = carrito.map(i => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px dashed #ccc; font-size:14px; color:#555;">
                    <span>• ${i.producto}</span> <span>$${i.precio}</span>
                </div>
            `).join('') + "<br>";
        }

        function cerrarVenta() {
            if (carrito.length === 0) return;
            document.getElementById('btn-enviar').innerText = "Guardando...";
            fetch(urlScript, { method: "POST", mode: "no-cors", body: JSON.stringify(carrito) })
            .then(() => location.reload());
        }
    </script>
</body>
</html>
