<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Minimarket</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; }
        .item { border-bottom: 1px solid #ccc; padding: 5px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Nueva Venta</h3>
        <input type="text" id="p" placeholder="Producto" list="lista">
        <datalist id="lista"><option value="Pan"><option value="Bebida"></datalist>
        <input type="number" id="v" placeholder="Precio $" inputmode="numeric">
        <div id="res"></div>
        <button onclick="enviar()" id="btn" style="background: #28a745; color: white;">GUARDAR EN EXCEL</button>
    </div>

    <script>
        let car = [];
        // PEGA TU URL AQUÍ ABAJO ENTRE LAS COMILLAS
        const URL = "https://script.google.com/macros/s/AKfycbwNz8E7ULF-CpqrUv_yPrTI8BonxoIxSNbPnUFqX5RXXQBzm3FmQ_hDX9iGxrFKc5m9Pg/exec"; 

        const inpP = document.getElementById('p');
        const inpV = document.getElementById('v');

        inpV.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && inpP.value && inpV.value) {
                car.push({ producto: inpP.value, precio: inpV.value, idVenta: Date.now() });
                dibujar();
                inpP.value = ""; inpV.value = ""; inpP.focus();
            }
        });

        function dibujar() {
            document.getElementById('res').innerHTML = car.map(i => `<div class="item">${i.producto} - $${i.precio}</div>`).join('');
        }

        function enviar() {
            if (car.length === 0) return alert("Agrega productos primero");
            const b = document.getElementById('btn');
            b.innerText = "Enviando..."; b.disabled = true;

            fetch(URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(car)
            })
            .then(() => {
                alert("Venta enviada. Revisa el Excel en 5 segundos.");
                car = []; dibujar();
                b.innerText = "GUARDAR EN EXCEL"; b.disabled = false;
            })
            .catch(e => alert("Error: " + e));
        }
    </script>
</body>
</html>
