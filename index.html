<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastBook Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo-icono.png">
    
    <style>
        :root {
            --accent: #06e1f0; 
            --bg: #000000;
            --card: #0A0E17;
            --text: #ffffff;
            --border: #1E293B;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px; 
        }

        .app-wrapper { width: 100%; max-width: 500px; min-height: 100vh; }

        .navbar {
            background: var(--bg);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
        }

        .img-icono { height: 35px; }
        .logo-texto-custom { font-size: 22px; font-weight: 800; }
        .logo-texto-custom span { color: var(--accent); }

        .container { padding: 20px; }

        .header-venta {
            text-align: center;
            padding: 20px;
            background: rgba(6, 225, 240, 0.05);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--accent);
        }

        .total-actual { font-size: 45px; font-weight: 800; color: var(--text); }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
        }

        .item-fila {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }

        input { 
            width: 100%; padding: 15px; border: 2px solid var(--border); 
            border-radius: 10px; background: #0A0E17; color: white; 
            box-sizing: border-box; font-size: 16px; margin-bottom: 10px;
        }

        .btn-add {
            background: var(--accent); color: black; border: none;
            border-radius: 10px; width: 60px; height: 54px; font-size: 25px; font-weight: bold;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; padding: 20px; box-sizing: border-box;
        }

        .modal-content {
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 20px; padding: 25px; max-width: 400px; margin: 50px auto;
        }

        .btn-pago {
            width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px;
            border: 1px solid var(--border); background: #1e293b; color: white;
            font-weight: 700; text-align: left;
        }

        .nav-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px 0;
            z-index: 2000;
        }

        .nav-item {
            background: none; border: none; color: #475569;
            font-size: 11px; font-weight: 700; display: flex; flex-direction: column;
            align-items: center; cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="navbar">
            <img src="logo-icono.png" alt="Icono" class="img-icono">
            <div class="logo-texto-custom"><span>Fast</span>Book</div>
        </div>

        <div class="container" id="vista-vender">
            <div class="header-venta">
                <div class="total-actual" id="txt-total-actual">$0</div>
            </div>

            <div class="card">
                <input type="text" id="producto" list="sugerencias" placeholder="¿Qué vendes?">
                <datalist id="sugerencias"></datalist>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
                    <button class="btn-add" onclick="agregarAlCarrito()">+</button>
                </div>
                
                <div id="lista-actual"></div>
                
                <button onclick="abrirCierreVenta()" id="btn-finalizar" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:12px; font-weight:800; margin-top:15px; display:none; cursor:pointer;">
                    ✅ FINALIZAR VENTA
                </button>
            </div>
        </div>

        <div class="container" id="vista-bitacora" style="display:none;">
            <h2 style="color:var(--accent);">Hoy</h2>
            <div id="lista-ventas-dia"></div>
        </div>

        <div class="container" id="vista-deudores" style="display:none;">
            <h2 style="color:var(--accent);">Deudores Pendientes</h2>
            <div id="lista-deudores"></div>
        </div>
    </div>

    <div id="modal-pago" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Método de Pago</h3>
            <button class="btn-pago" onclick="finalizarVenta('Efectivo')">💵 Efectivo</button>
            <button class="btn-pago" onclick="finalizarVenta('Tarjeta')">💳 Tarjeta</button>
            <button class="btn-pago" onclick="document.getElementById('seccion-fiado').style.display='block'">📝 Fiado</button>
            
            <div id="seccion-fiado" style="display:none; margin-top:15px;">
                <input type="text" id="nombre-cliente" placeholder="Nombre del cliente...">
                <button style="width:100%; background:var(--accent); padding:12px; border:none; border-radius:8px; font-weight:bold;" onclick="finalizarVenta('Fiado')">GUARDAR DEUDA</button>
            </div>
            <button onclick="cerrarModal()" style="width:100%; background:none; border:none; color:#64748b; margin-top:15px;">Cancelar</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-item active" id="btn-nav-vender" onclick="cambiarVista('vender')">🛒<br>Vender</button>
        <button class="nav-item" id="btn-nav-bitacora" onclick="cambiarVista('bitacora')">🗓️<br>Bitácora</button>
        <button class="nav-item" id="btn-nav-deudores" onclick="cambiarVista('deudores')">👥<br>Deudores</button>
    </nav>

    <script>
        let carrito = [];
        let datosServidor = { productos: [], detalleHoy: [], deudores: [] };
        // COLOCA AQUÍ TU NUEVA URL DE GOOGLE APPS SCRIPT
        const urlScript = "https://script.google.com/macros/s/AKfycbzSKScOubFdtw6AxGoryxI18h1f0JQJnZ1JTAVakW3ejhA3GcShp2VyAUr5g4nWuP6XGA/exec"; 

        window.onload = () => {
            fetch(urlScript + "?t=" + Date.now()).then(r => r.json()).then(data => {
                datosServidor = data;
                document.getElementById('sugerencias').innerHTML = data.productos.map(p => `<option value="${p}">`).join('');
            });
        };

        function agregarAlCarrito() {
            const p = document.getElementById('producto'), pr = document.getElementById('precio');
            if (p.value && pr.value) {
                carrito.push({ id: Date.now(), producto: p.value, precio: parseInt(pr.value) });
                p.value = ""; pr.value = "";
                actualizarVista();
            }
        }

        function actualizarVista() {
            const lista = document.getElementById('lista-actual');
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('txt-total-actual').innerText = `$${total.toLocaleString()}`;
            
            lista.innerHTML = carrito.map(item => `
                <div class="item-fila">
                    <div><strong>${item.producto}</strong><br><small>$${item.precio}</small></div>
                    <div>
                        <button onclick="editarItem(${item.id})" style="background:none; border:none;">✏️</button>
                        <button onclick="eliminarItem(${item.id})" style="background:none; border:none;">🗑️</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('btn-finalizar').style.display = carrito.length > 0 ? 'block' : 'none';
        }

        function eliminarItem(id) { carrito = carrito.filter(i => i.id !== id); actualizarVista(); }
        function editarItem(id) {
            const i = carrito.find(x => x.id === id);
            document.getElementById('producto').value = i.producto;
            document.getElementById('precio').value = i.precio;
            eliminarItem(id);
        }

        function abrirCierreVenta() { document.getElementById('modal-pago').style.display = 'block'; }
        function cerrarModal() { document.getElementById('modal-pago').style.display = 'none'; }

        function finalizarVenta(metodo) {
            const cliente = metodo === 'Fiado' ? document.getElementById('nombre-cliente').value : 'Venta Directa';
            if (metodo === 'Fiado' && !cliente) return alert("Falta nombre");

            const btn = document.getElementById('btn-finalizar');
            btn.innerText = "⏳ Guardando...";
            btn.disabled = true;

            const datosVenta = {
                items: carrito,
                total: carrito.reduce((s, i) => s + i.precio, 0),
                pago: metodo,
                cliente: cliente
            };

            fetch(urlScript, { method: "POST", mode: "no-cors", body: JSON.stringify(datosVenta) })
            .then(() => {
                alert("Venta guardada!");
                location.reload();
            });
        }

        function cambiarVista(v) {
            document.getElementById('vista-vender').style.display = v === 'vender' ? 'block' : 'none';
            document.getElementById('vista-bitacora').style.display = v === 'bitacora' ? 'block' : 'none';
            document.getElementById('vista-deudores').style.display = v === 'deudores' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-nav-' + v).classList.add('active');

            if (v === 'bitacora') renderBitacora();
            if (v === 'deudores') renderDeudores();
        }

        function renderBitacora() {
            const lista = document.getElementById('lista-ventas-dia');
            lista.innerHTML = datosServidor.detalleHoy.map(v => `<div class="item-fila"><span>${v.hora} - ${v.nombre}</span><span>$${v.precio}</span></div>`).join('') || "Sin ventas";
        }

        function renderDeudores() {
            const lista = document.getElementById('lista-deudores');
            lista.innerHTML = datosServidor.deudores.map(d => `<div class="item-fila" style="border: 1px solid #1E293B; margin-bottom:10px; padding:10px; border-radius:10px;"><div><strong>${d.nombre}</strong><br><small>${d.fecha}</small></div><strong style="color:var(--accent)">$${d.monto}</strong></div>`).join('') || "Nadie debe";
        }
    </script>
</body>
</html>
