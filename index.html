<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastBook - Cuaderno Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #06b6d4; /* Cian del logo */
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --dark: #1e293b;
            --text: #1e293b;
            --card: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* NAVBAR CON LOGO */
        .navbar {
            background: var(--dark);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            height: 32px;
            width: auto;
        }

        .logo-text {
            color: white;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent);
        }

        /* CONTENIDO */
        .container { padding: 15px; }

        .card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        h3 { margin-top: 0; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--dark); }

        .btn-historial { 
            background: var(--primary); 
            color: white; 
            margin-bottom: 20px; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            font-size: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        .btn-add {
            background: var(--dark);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 12px;
            width: 55px;
            height: 50px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-green { 
            background: var(--success); 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            margin-top: 20px; 
            cursor: pointer;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .item-actual { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid #f1f5f9; 
        }

        .total-actual { 
            text-align: right; 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--danger); 
            margin: 20px 0 10px 0; 
        }

        #pantalla-historial { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            z-index: 2000; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto; 
        }

        .venta-dia-item { 
            background: white;
            margin-bottom: 8px;
            padding: 14px; 
            border-radius: 10px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 4px solid var(--accent);
        }

        .total-dia-caja { 
            background: var(--dark); 
            color: white; 
            padding: 20px; 
            border-radius: 14px; 
            margin: 20px 0; 
            text-align: center; 
            font-size: 24px; 
            font-weight: 800; 
            border-bottom: 4px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-container">
            <img src="logo-fastbook.png" alt="FastBook Logo" class="logo-img">
            <div class="logo-text"><span>Fast</span>Book</div>
        </div>
        <div style="color: #64748b; font-size: 11px; font-weight: 600;">v1.0</div>
    </div>

    <div class="container">
        <button class="btn-historial" onclick="verHistorial()">📅 Ver Bitácora de Hoy</button>

        <div class="card">
            <h3>🛒 Nueva Venta</h3>
            <input type="text" id="producto" list="sugerencias" placeholder="¿Qué vendes?" autocomplete="off">
            <datalist id="sugerencias"></datalist>
            
            <div class="input-group">
                <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
                <button class="btn-add" onclick="agregarAlCarrito()">+</button>
            </div>
            
            <div id="lista-actual" style="margin-top: 15px;"></div>
            <div class="total-actual" id="txt-total-actual">Total: $0</div>

            <button onclick="cerrarVenta()" id="btn-enviar" class="btn-green">✅ Finalizar Venta</button>
        </div>
    </div>

    <div id="pantalla-historial">
        <button class="btn-historial" style="background:#475569" onclick="cerrarHistorial()">⬅️ Volver a Vender</button>
        <h2 style="text-align:center; color: var(--dark);">Ventas de Hoy</h2>
        <div class="total-dia-caja" id="caja-total-dia">Total: $0</div>
        <div id="lista-ventas-dia"></div>
    </div>

    <script>
        let carrito = [];
        let datosServidor = { productos: [], detalleHoy: [], totalHoy: 0 };
        
        // URL de tu Script de Google
        const urlScript = "https://script.google.com/macros/s/AKfycbx9ouaqW0EpWxI7w-IghgT0uHunJLwAGllTlRhT2zwQ6As2NrtzxLyDIXsJizxYD27FCg/exec"; 

        const inProd = document.getElementById('producto');
        const inPrec = document.getElementById('precio');

        window.onload = cargarDesdeExcel;

        function cargarDesdeExcel() {
            const urlConCacheBuster = urlScript + "?t=" + new Date().getTime();
            fetch(urlConCacheBuster)
            .then(r => r.json())
            .then(data => {
                datosServidor = data;
                document.getElementById('sugerencias').innerHTML = data.productos.map(p => `<option value="${p}">`).join('');
                document.getElementById('caja-total-dia').innerText = `Total en Caja: $${data.totalHoy.toLocaleString()}`;
                
                if(document.getElementById('pantalla-historial').style.display === 'block') {
                    dibujarListaVentas();
                }
            })
            .catch(e => {
                console.error("Error:", e);
            });
        }

        function agregarAlCarrito() {
            if (inProd.value && inPrec.value) {
                carrito.push({ producto: inProd.value, precio: parseInt(inPrec.value), idVenta: Date.now() });
                actualizarCalculadora();
                inProd.value = ""; 
                inPrec.value = ""; 
                inProd.focus();
            }
        }

        inProd.addEventListener('input', () => {
            const opts = document.querySelectorAll('#sugerencias option');
            for (let o of opts) { if (o.value === inProd.value) { inPrec.focus(); break; } }
        });

        inPrec.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { agregarAlCarrito(); }
        });

        function actualizarCalculadora() {
            document.getElementById('lista-actual').innerHTML = carrito.map(i => `
                <div class="item-actual"><span>${i.producto}</span> <strong>$${i.precio.toLocaleString()}</strong></div>
            `).join('');
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('txt-total-actual').innerText = `Total: $${total.toLocaleString()}`;
        }

        function verHistorial() {
            document.getElementById('pantalla-historial').style.display = 'block';
            dibujarListaVentas();
        }

        function dibujarListaVentas() {
            const lista = document.getElementById('lista-ventas-dia');
            if (datosServidor && datosServidor.detalleHoy && datosServidor.detalleHoy.length > 0) {
                lista.innerHTML = datosServidor.detalleHoy.map(v => `
                    <div class="venta-dia-item">
                        <div style="display: flex; flex-direction: column;">
                            <span style="color: #64748b; font-size: 11px; font-weight: 700; margin-bottom: 2px;">
                                🕒 ${v.hora || '--:--'}
                            </span>
                            <span style="font-weight: 600; font-size: 15px; color: var(--dark);">
                                ${v.nombre}
                            </span>
                        </div>
                        <strong style="color: var(--success); font-size: 18px;">
                            $${(v.precio || 0).toLocaleString()}
                        </strong>
                    </div>
                `).join('');
            } else {
                lista.innerHTML = "<p style='text-align:center; color:#94a3b8; margin-top:20px;'>No hay registros recientes</p>";
            }
        }

        function cerrarHistorial() { document.getElementById('pantalla-historial').style.display = 'none'; }

        function cerrarVenta() {
            if (carrito.length === 0) return;
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "⏳ Guardando...";
            btn.disabled = true;
            fetch(urlScript, { method: "POST", mode: "no-cors", body: JSON.stringify(carrito) })
            .then(() => {
                setTimeout(() => { location.reload(); }, 1500); 
            });
        }
    </script>
</body>
</html>
