<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno Digital Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
            --card: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            padding: 15px; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        h3 { margin-top: 0; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        .btn-historial { 
            background: var(--primary); 
            color: white; 
            margin-bottom: 20px; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            width: 55px;
            height: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-green { 
            background: var(--success); 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            margin-top: 20px; 
            cursor: pointer;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .item-actual { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid #f1f5f9; 
        }

        .total-actual { 
            text-align: right; 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--danger); 
            margin: 20px 0 10px 0; 
        }

        #pantalla-historial { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            z-index: 1000; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto; 
        }

        .venta-dia-item { 
            background: white;
            margin-bottom: 8px;
            padding: 14px; 
            border-radius: 10px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .total-dia-caja { 
            background: #1e293b; 
            color: white; 
            padding: 20px; 
            border-radius: 14px; 
            margin: 20px 0; 
            text-align: center; 
            font-size: 22px; 
            font-weight: 700; 
        }
    </style>
</head>
<body>

    <button class="btn-historial" onclick="verHistorial()">📅 Ver Bitácora de Hoy</button>

    <div class="card">
        <h3>🛒 Nueva Venta</h3>
        <input type="text" id="producto" list="sugerencias" placeholder="¿Qué vendes?" autocomplete="off">
        <datalist id="sugerencias"></datalist>
        
        <div class="input-group">
            <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
            <button class="btn-add" onclick="agregarAlCarrito()">+</button>
        </div>
        
        <div id="lista-actual" style="margin-top: 15px;"></div>
        <div class="total-actual" id="txt-total-actual">Total: $0</div>

        <button onclick="cerrarVenta()" id="btn-enviar" class="btn-green">✅ Finalizar Venta</button>
    </div>

    <div id="pantalla-historial">
        <button class="btn-historial" style="background:#475569" onclick="cerrarHistorial()">⬅️ Volver a Vender</button>
        <h2 style="text-align:center;">Ventas de Hoy</h2>
        <div class="total-dia-caja" id="caja-total-dia">Total en Caja: $0</div>
        <div id="lista-ventas-dia"></div>
    </div>

    <script>
        let carrito = [];
        let datosServidor = { productos: [], detalleHoy: [], totalHoy: 0 };
        const urlScript = "https://script.google.com/macros/s/AKfycbxHFj7sZ19oClSBbD5yyJj3aSChD-jhmtPPtyg-NihqEOqk3HSanAnCspGG4TLsPoAGQw/exec"; 

        const inProd = document.getElementById('producto');
        const inPrec = document.getElementById('precio');

        window.onload = cargarDesdeExcel;

        function cargarDesdeExcel() {
            // EL TRUCO PARA IPHONE: Añadimos un parámetro de tiempo para que no use la caché
            const urlConCacheBuster = urlScript + "?t=" + new Date().getTime();
            
            fetch(urlConCacheBuster)
            .then(r => r.json())
            .then(data => {
                datosServidor = data;
                document.getElementById('sugerencias').innerHTML = data.productos.map(p => `<option value="${p}">`).join('');
                document.getElementById('caja-total-dia').innerText = `Total en Caja: $${data.totalHoy.toLocaleString()}`;
                
                // Si la bitácora está abierta, la actualizamos de inmediato
                if(document.getElementById('pantalla-historial').style.display === 'block') {
                    dibujarListaVentas();
                }
            })
            .catch(e => {
                console.error("Error:", e);
                document.getElementById('lista-ventas-dia').innerHTML = "<p style='text-align:center; color:red;'>Error de conexión</p>";
            });
        }

        function agregarAlCarrito() {
            if (inProd.value && inPrec.value) {
                carrito.push({ producto: inProd.value, precio: parseInt(inPrec.value), idVenta: Date.now() });
                actualizarCalculadora();
                inProd.value = ""; 
                inPrec.value = ""; 
                inProd.focus();
            }
        }

        inProd.addEventListener('input', () => {
            const opts = document.querySelectorAll('#sugerencias option');
            for (let o of opts) { if (o.value === inProd.value) { inPrec.focus(); break; } }
        });

        inPrec.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { agregarAlCarrito(); }
        });

        function actualizarCalculadora() {
            document.getElementById('lista-actual').innerHTML = carrito.map(i => `
                <div class="item-actual"><span>${i.producto}</span> <strong>$${i.precio.toLocaleString()}</strong></div>
            `).join('');
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('txt-total-actual').innerText = `Total: $${total.toLocaleString()}`;
        }

        function verHistorial() {
            document.getElementById('pantalla-historial').style.display = 'block';
            dibujarListaVentas();
        }

        function dibujarListaVentas() {
    const lista = document.getElementById('lista-ventas-dia');
    if (datosServidor.detalleHoy && datosServidor.detalleHoy.length > 0) {
        lista.innerHTML = datosServidor.detalleHoy.map(v => `
            <div class="venta-dia-item">
                <div style="display: flex; flex-direction: column;">
                    <span style="color: #64748b; font-size: 11px; font-weight: 600; margin-bottom: 2px;">
                        🕒 ${v.hora || 'Registrada'}
                    </span>
                    <span style="font-weight: 500; font-size: 15px; color: #1e293b;">
                        ${v.nombre}
                    </span>
                </div>
                <strong style="color: var(--success); font-size: 18px;">
                    $${v.precio.toLocaleString()}
                </strong>
            </div>
        `).join('');
    } else {
        lista.innerHTML = "<p style='text-align:center; color:#94a3b8; margin-top:20px;'>No hay ventas hoy o cargando...</p>";
    }
}

        function cerrarHistorial() { document.getElementById('pantalla-historial').style.display = 'none'; }

        function cerrarVenta() {
            if (carrito.length === 0) return;
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "⏳ Guardando...";
            btn.disabled = true;
            fetch(urlScript, { method: "POST", mode: "no-cors", body: JSON.stringify(carrito) })
            .then(() => {
                setTimeout(() => { location.reload(); }, 1500); 
            });
        }
    </script>
</body>
</html>
