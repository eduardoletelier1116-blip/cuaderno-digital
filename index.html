<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastBook Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo-icono.png">
    
    <style>
        :root {
            --accent: #06e1f0; 
            --bg: #000000;
            --card: #0A0E17;
            --text: #ffffff;
            --border: #1E293B;
            --danger: #ff4757;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px; /* Espacio para el botón de abajo */
        }

        .app-wrapper { width: 100%; max-width: 500px; min-height: 100vh; }

        .navbar {
            background: var(--bg);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
        }

        .img-icono { height: 35px; width: auto; }
        .logo-texto-custom { font-size: 22px; font-weight: 800; color: #ffffff; }
        .logo-texto-custom span { color: var(--accent); }

        .container { padding: 20px; }

        /* ESPACIO PARA EL TOTAL CLIENTE */
        .header-venta {
            text-align: center;
            padding: 20px;
            background: rgba(6, 225, 240, 0.05);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--accent);
        }

        .header-venta small { color: var(--accent); font-weight: 600; text-transform: uppercase; font-size: 12px; }
        .total-actual { font-size: 45px; font-weight: 800; color: var(--text); margin: 5px 0; }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
        }

        /* LISTA DE ITEMS CON ACCIONES */
        .item-fila {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }

        .item-info { flex-grow: 1; }
        .item-acciones { display: flex; gap: 15px; margin-left: 10px; }
        .btn-accion { background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; }

        input { 
            width: 100%; padding: 15px; border: 2px solid var(--border); 
            border-radius: 10px; background: #0A0E17; color: white; 
            box-sizing: border-box; font-size: 16px; margin-bottom: 10px;
        }

        .btn-add {
            background: var(--accent); color: black; border: none;
            border-radius: 10px; width: 60px; height: 54px; font-size: 25px; font-weight: bold;
        }

        /* MODALES */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; padding: 20px; box-sizing: border-box;
        }

        .modal-content {
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 20px; padding: 25px; max-width: 400px; margin: 50px auto;
        }

        .btn-pago {
            width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px;
            border: 1px solid var(--border); background: #1e293b; color: white;
            font-weight: 700; text-align: left; display: flex; justify-content: space-between;
        }

        .btn-pago:active { background: var(--accent); color: black; }

        /* NAVEGACIÓN INFERIOR */
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px 0;
            z-index: 2000;
        }

        .nav-item {
            background: none; border: none; color: #475569;
            font-size: 11px; font-weight: 700; display: flex; flex-direction: column;
            align-items: center; gap: 5px; cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="navbar">
            <img src="logo-icono.png" alt="Icono" class="img-icono">
            <div class="logo-texto-custom"><span>Fast</span>Book</div>
        </div>

        <div class="container" id="vista-vender">
            <div class="header-venta">
                <small>Subtotal Venta</small>
                <div class="total-actual" id="txt-total-actual">$0</div>
            </div>

            <div class="card">
                <input type="text" id="producto" list="sugerencias" placeholder="Producto...">
                <datalist id="sugerencias"></datalist>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
                    <button class="btn-add" onclick="agregarAlCarrito()">+</button>
                </div>
                
                <div id="lista-actual" style="margin-top: 10px;"></div>
                <button onclick="abrirCierreVenta()" id="btn-finalizar" class="btn-green" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:12px; font-weight:800; margin-top:15px; display:none;">
                    ✅ CERRAR VENTA
                </button>
            </div>
        </div>

        <div class="container" id="vista-deudores" style="display:none;">
            <h2 style="color:var(--accent);">👥 Cuentas por Cobrar</h2>
            <div id="lista-deudores"></div>
        </div>
    </div>

    <div id="modal-pago" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Selecciona Pago</h3>
            <button class="btn-pago" onclick="finalizarVenta('Efectivo')">💵 Efectivo <span>></span></button>
            <button class="btn-pago" onclick="finalizarVenta('Tarjeta')">💳 Tarjeta <span>></span></button>
            <button class="btn-pago" onclick="mostrarInputFiado()">📝 Fiado (Deuda) <span>></span></button>
            
            <div id="seccion-fiado" style="display:none; margin-top:15px;">
                <input type="text" id="nombre-cliente" placeholder="Nombre del cliente...">
                <button class="btn-green" style="width:100%; background:var(--accent); padding:10px; border:none; border-radius:8px; font-weight:bold;" onclick="finalizarVenta('Fiado')">GUARDAR DEUDA</button>
            </div>
            <button onclick="cerrarModal()" style="width:100%; background:none; border:none; color:#64748b; margin-top:15px;">Cancelar</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-item active" onclick="cambiarVista('vender')"><span>🛒</span>Vender</button>
        <button class="nav-item" onclick="verHistorial()"><span>🗓️</span>Bitácora</button>
        <button class="nav-item" onclick="cambiarVista('deudores')"><span>👥</span>Deudores</button>
    </nav>

    <script>
        let carrito = [];
        let datosServidor = { productos: [], detalleHoy: [], deudores: [] };
        const urlScript = "https://script.google.com/macros/s/AKfycbzvl7pnGdYkVyZRhGwX7vZrbkAChnF_0HHoPHW66__2oJTpoETcUnlTPnj5UQWOH7KY9A/exec"; 

        function agregarAlCarrito() {
            const p = document.getElementById('producto');
            const pr = document.getElementById('precio');
            if (p.value && pr.value) {
                carrito.push({ id: Date.now(), producto: p.value, precio: parseInt(pr.value) });
                p.value = ""; pr.value = "";
                actualizarVista();
            }
        }

        function actualizarVista() {
            const lista = document.getElementById('lista-actual');
            const btnFin = document.getElementById('btn-finalizar');
            
            lista.innerHTML = carrito.map(item => `
                <div class="item-fila">
                    <div class="item-info">
                        <strong>${item.producto}</strong><br>
                        <span style="color:var(--accent)">$${item.precio.toLocaleString()}</span>
                    </div>
                    <div class="item-acciones">
                        <button class="btn-accion" onclick="editarItem(${item.id})">✏️</button>
                        <button class="btn-accion" onclick="eliminarItem(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');

            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('txt-total-actual').innerText = `$${total.toLocaleString()}`;
            btnFin.style.display = carrito.length > 0 ? 'block' : 'none';
        }

        function eliminarItem(id) {
            carrito = carrito.filter(i => i.id !== id);
            actualizarVista();
        }

        function editarItem(id) {
            const item = carrito.find(i => i.id === id);
            document.getElementById('producto').value = item.producto;
            document.getElementById('precio').value = item.precio;
            eliminarItem(id);
        }

        function abrirCierreVenta() { document.getElementById('modal-pago').style.display = 'block'; }
        function cerrarModal() { document.getElementById('modal-pago').style.display = 'none'; }
        function mostrarInputFiado() { document.getElementById('seccion-fiado').style.display = 'block'; }

        function finalizarVenta(metodo) {
            const cliente = metodo === 'Fiado' ? document.getElementById('nombre-cliente').value : 'Venta Directa';
            if (metodo === 'Fiado' && !cliente) return alert("Escribe el nombre del cliente");

            const datosVenta = {
                items: carrito,
                total: carrito.reduce((s, i) => s + i.precio, 0),
                pago: metodo,
                cliente: cliente,
                fecha: new Date().toISOString()
            };

            // Aquí enviarías a Google Sheets
            console.log("Enviando venta...", datosVenta);
            alert("Venta guardada como " + metodo);
            location.reload();
        }

        function cambiarVista(vista) {
            document.getElementById('vista-vender').style.display = vista === 'vender' ? 'block' : 'none';
            document.getElementById('vista-deudores').style.display = vista === 'deudores' ? 'block' : 'none';
            // Lógica para marcar botón activo en nav
        }
    </script>
</body>
</html>
