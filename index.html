<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno Digital</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .item { background: white; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        #total-flotante { font-weight: bold; text-align: right; font-size: 20px; color: #d9534f; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Nueva Venta</h2>
    
    <input type="text" id="producto" list="sugerencias" placeholder="Producto..." autocomplete="off">
    <datalist id="sugerencias">
        <option value="Pan">
        <option value="Bebida 1.5L">
        <option value="Cigarrillos">
        </datalist>

    <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">

    <div id="total-flotante">Total: $0</div>
    <div id="lista-actual"></div>
    <br>
    <button onclick="cerrarVenta()" id="btn-finalizar" style="background: #007bff;">Cerrar Venta</button>

    <script>
        let carrito = [];
        let idVentaActual = Date.now(); // ID único basado en el tiempo

        const inputProd = document.getElementById('producto');
        const inputPrec = document.getElementById('precio');

        // ESCUCHADOR: Si selecciona producto, salta al precio
        inputProd.addEventListener('input', () => {
            const opciones = document.querySelectorAll('#sugerencias option');
            for (let opt of opciones) {
                if (opt.value === inputProd.value) {
                    inputPrec.focus();
                    break;
                }
            }
        });

        // ESCUCHADOR: Si presiona Enter en el precio, guarda el ítem
        inputPrec.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (inputProd.value && inputPrec.value) {
                    agregarItem(inputProd.value, inputPrec.value);
                    inputProd.value = "";
                    inputPrec.value = "";
                    inputProd.focus(); // Vuelve al inicio para el siguiente producto
                }
            }
        });

        function agregarItem(prod, prec) {
            carrito.push({ producto: prod, precio: parseInt(prec), idVenta: idVentaActual });
            renderizarCarrito();
        }

        function renderizarCarrito() {
            const lista = document.getElementById('lista-actual');
            const totalDiv = document.getElementById('total-flotante');
            lista.innerHTML = carrito.map(i => `<div class="item"><span>${i.producto}</span> <span>$${i.precio}</span></div>`).join('');
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            totalDiv.innerText = `Total: $${total}`;
        }

        function cerrarVenta() {
            if (carrito.length === 0) return;
            
            const urlScript = "https://script.google.com/macros/s/AKfycbxNyGgn8QSrc61T6eqmr0jFCvuYfx7q635KjEy7PmZYQ8gW0z8lTE8EL7kn9Pfhy7D60A/exec"; // PEGA AQUÍ LA URL DEL PASO 2
            
            fetch(urlScript, {
                method: "POST",
                body: JSON.stringify(carrito)
            }).then(() => {
                alert("Venta guardada en Excel");
                carrito = [];
                idVentaActual = Date.now();
                renderizarCarrito();
            });
        }
    </script>
</body>
</html>
