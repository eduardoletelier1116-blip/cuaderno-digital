<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastBook - Sistema de Ventas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="logo-icono.png">
    
    <style>
        :root {
            --accent: #06e1f0; 
            --bg: #000000;
            --card: #0A0E17;
            --text: #ffffff;
            --border: #1E293B;
            --input-bg: #0A0E17;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-wrapper {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR CON LOGO EN DOS PARTES */
        .navbar {
            background: var(--bg);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Icono a la izq, Nombre a la der */
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(6, 225, 240, 0.1);
        }

        /* Ajuste del Icono (Libro) */
        .img-icono {
            height: 38px;
            width: auto;
            object-fit: contain;
        }

        /* Ajuste del Nombre (Texto) */
        .img-nombre {
            height: 22px; /* Un poco más pequeño que el icono para que se vea elegante */
            width: auto;
            object-fit: contain;
        }

        .container { padding: 20px; flex-grow: 1; }

        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-historial { 
            background: transparent; 
            color: white; 
            margin-bottom: 20px; 
            width: 100%; 
            padding: 15px; 
            border: 2px solid var(--accent); 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-green { 
            background: var(--accent); 
            color: #000; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 800; 
            margin-top: 20px; 
            cursor: pointer;
            box-shadow: 0 0 20px rgba(6, 225, 240, 0.4);
        }

        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            background: var(--input-bg);
            color: var(--text);
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .btn-add {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 10px;
            width: 60px;
            height: 54px;
            font-size: 30px;
            font-weight: bold;
        }

        .total-actual { text-align: right; font-size: 35px; font-weight: 800; color: var(--accent); margin: 20px 0; }

        #pantalla-historial { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 2000; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto; 
        }

        .grupo-venta-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            max-width: 460px;
            margin: 0 auto 15px auto;
        }

        .grupo-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 700;
        }

        .grupo-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            color: #cbd5e1;
        }

        .grupo-total {
            text-align: right;
            margin-top: 12px;
            font-weight: 800;
            font-size: 20px;
            color: #ffffff;
            border-top: 1px dashed var(--border);
            padding-top: 8px;
        }

        .total-dia-caja { 
            background: var(--card); 
            color: var(--accent); 
            padding: 25px; 
            border-radius: 15px; 
            margin: 20px auto; 
            text-align: center; 
            font-size: 28px; 
            font-weight: 800; 
            border: 1px solid var(--accent);
            max-width: 460px;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="navbar">
            <img src="logo-icono.png" alt="FastBook Icono" class="img-icono">
            
            <img src="logo-fastbook.png" alt="FastBook" class="img-nombre">
        </div>

        <div class="container">
            <button class="btn-historial" onclick="verHistorial()">🗓️ Ver Bitácora</button>

            <div class="card">
                <h3 style="margin-top:0; color:white; font-size: 18px; margin-bottom: 15px;">🛒 Nueva Venta</h3>
                <input type="text" id="producto" list="sugerencias" placeholder="¿Qué vendes?" autocomplete="off">
                <datalist id="sugerencias"></datalist>
                
                <div style="display:flex; gap:10px;">
                    <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
                    <button class="btn-add" onclick="agregarAlCarrito()">+</button>
                </div>
                
                <div id="lista-actual" style="margin-top: 20px;"></div>
                <div class="total-actual" id="txt-total-actual">$0</div>

                <button onclick="cerrarVenta()" id="btn-enviar" class="btn-green">✅ Finalizar Venta</button>
            </div>
        </div>
    </div>

    <div id="pantalla-historial">
        <div style="max-width: 500px; margin: 0 auto;">
            <button class="btn-historial" style="border-color: #475569;" onclick="cerrarHistorial()">⬅️ Volver</button>
            <h2 style="text-align:center;">Ventas de Hoy</h2>
            <div class="total-dia-caja" id="caja-total-dia">$0</div>
            <div id="lista-ventas-dia"></div>
        </div>
    </div>

    <script>
        let carrito = [];
        let datosServidor = { productos: [], detalleHoy: [], totalHoy: 0 };
        const urlScript = "https://script.google.com/macros/s/AKfycbx9ouaqW0EpWxI7w-IghgT0uHunJLwAGllTlRhT2zwQ6As2NrtzxLyDIXsJizxYD27FCg/exec"; 

        window.onload = cargarDesdeExcel;

        function cargarDesdeExcel() {
            fetch(urlScript + "?t=" + Date.now())
            .then(r => r.json())
            .then(data => {
                datosServidor = data;
                document.getElementById('sugerencias').innerHTML = data.productos.map(p => `<option value="${p}">`).join('');
                document.getElementById('caja-total-dia').innerText = `Total: $${data.totalHoy.toLocaleString()}`;
            });
        }

        function agregarAlCarrito() {
            const p = document.getElementById('producto');
            const pr = document.getElementById('precio');
            if (p.value && pr.value) {
                carrito.push({ producto: p.value, precio: parseInt(pr.value) });
                actualizarVista();
                p.value = ""; pr.value = ""; p.focus();
            }
        }

        function actualizarVista() {
            const lista = document.getElementById('lista-actual');
            lista.innerHTML = carrito.map(i => `
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                    <span>${i.producto}</span>
                    <strong style="color:var(--accent);">$${i.precio.toLocaleString()}</strong>
                </div>`).join('');
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('txt-total-actual').innerText = `$${total.toLocaleString()}`;
        }

        function verHistorial() {
            document.getElementById('pantalla-historial').style.display = 'block';
            const lista = document.getElementById('lista-ventas-dia');
            const grupos = {};
            datosServidor.detalleHoy.forEach(v => {
                const llave = v.hora; 
                if (!grupos[llave]) grupos[llave] = { hora: v.hora, items: [], total: 0 };
                grupos[llave].items.push(v);
                grupos[llave].total += v.precio;
            });

            const html = Object.values(grupos).reverse().map(g => `
                <div class="grupo-venta-card">
                    <div class="grupo-header">
                        <span>🕒 Hora: ${g.hora}</span>
                        <span>${g.items.length} productos</span>
                    </div>
                    ${g.items.map(item => `
                        <div class="grupo-item">
                            <span>${item.nombre}</span>
                            <span>$${item.precio.toLocaleString()}</span>
                        </div>
                    `).join('')}
                    <div class="grupo-total">Total: $${g.total.toLocaleString()}</div>
                </div>
            `).join('');
            lista.innerHTML = html || "<p style='text-align:center;'>Sin ventas registradas</p>";
        }

        function cerrarHistorial() { document.getElementById('pantalla-historial').style.display = 'none'; }

        function cerrarVenta() {
            if (carrito.length === 0) return;
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "⏳ Guardando...";
            btn.disabled = true;
            fetch(urlScript, { method: "POST", mode: "no-cors", body: JSON.stringify(carrito) })
            .then(() => setTimeout(() => location.reload(), 1200));
        }
    </script>
</body>
</html>
