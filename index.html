<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastBook - Ventas Agrupadas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo-fastbook.png">
    
    <style>
        :root {
            --accent: #06e1f0; 
            --success: #06e1f0;
            --danger: #ef4444;
            -webkit-tap-highlight-color: transparent;
        }

        body.fb-theme-dark {
            --bg: #000000;
            --card: #0A0E17; 
            --text: #ffffff;
            --navbar: #000000;
            --border: #1E293B;
            --input-bg: #0A0E17;
        }

        body.fb-theme-light {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --navbar: #ffffff;
            --border: #e2e8f0;
            --input-bg: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }

        .navbar {
            background: var(--navbar);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 35px; width: auto; }
        .logo-main-text { font-size: 20px; font-weight: 800; color: white; }
        .logo-main-text span { color: var(--accent); }

        .container { padding: 20px; }
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
        }

        .btn-historial { 
            background: transparent; 
            color: white; 
            margin-bottom: 20px; 
            width: 100%; 
            padding: 15px; 
            border: 2px solid var(--accent); 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-green { 
            background: var(--accent); 
            color: #000; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 800; 
            margin-top: 20px; 
            box-shadow: 0 0 20px rgba(6, 225, 240, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-add {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 10px;
            width: 60px;
            height: 54px;
            font-size: 30px;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            background: var(--input-bg);
            color: var(--text);
            box-sizing: border-box;
            font-size: 16px;
        }

        .total-actual { text-align: right; font-size: 30px; font-weight: 800; color: var(--accent); margin: 20px 0; }

        /* ESTILO DE BITÁCORA AGRUPADA */
        #pantalla-historial { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 2000; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto; 
        }

        .grupo-venta-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .grupo-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--accent);
            font-weight: 700;
        }

        .grupo-item {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            padding: 4px 0;
            color: #cbd5e1;
        }

        .grupo-total {
            text-align: right;
            margin-top: 10px;
            font-weight: 800;
            font-size: 18px;
            color: #ffffff;
        }

        .total-dia-caja { 
            background: var(--card); 
            color: var(--accent); 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px 0; 
            text-align: center; 
            font-size: 26px; 
            font-weight: 800; 
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-container">
            <img src="logo-fastbook.png" alt="FastBook" class="logo-img">
            <div class="logo-main-text"><span>Fast</span>Book</div>
        </div>
        <div style="color: #475569; font-size: 12px;">v2.0</div>
    </div>

    <div class="container">
        <button class="btn-historial" onclick="verHistorial()">🗓️ Ver Bitácora Agrupada</button>

        <div class="card">
            <input type="text" id="producto" list="sugerencias" placeholder="¿Qué vendes?" autocomplete="off">
            <datalist id="sugerencias"></datalist>
            
            <div class="input-group" style="display:flex; gap:10px; margin-top:10px;">
                <input type="number" id="precio" placeholder="Precio $" inputmode="numeric">
                <button class="btn-add" onclick="agregarAlCarrito()">+</button>
            </div>
            
            <div id="lista-actual" style="margin-top: 20px;"></div>
            <div class="total-actual" id="txt-total-actual">$0</div>

            <button onclick="cerrarVenta()" id="btn-enviar" class="btn-green">✅ Finalizar Venta</button>
        </div>
    </div>

    <div id="pantalla-historial">
        <button class="btn-historial" style="border-color: #475569;" onclick="cerrarHistorial()">⬅️ Volver</button>
        <h2 style="text-align:center;">Ventas de Hoy</h2>
        <div class="total-dia-caja" id="caja-total-dia">$0</div>
        <div id="lista-ventas-dia"></div>
    </div>

    <script>
        function detectarDispositivo() {
            const esMovil = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            document.body.className = esMovil ? 'fb-theme-dark' : 'fb-theme-light';
        }
        detectarDispositivo();

        let carrito = [];
        let datosServidor = { productos: [], detalleHoy: [], totalHoy: 0 };
        const urlScript = "https://script.google.com/macros/s/AKfycbx9ouaqW0EpWxI7w-IghgT0uHunJLwAGllTlRhT2zwQ6As2NrtzxLyDIXsJizxYD27FCg/exec"; 

        window.onload = cargarDesdeExcel;

        function cargarDesdeExcel() {
            fetch(urlScript + "?t=" + Date.now())
            .then(r => r.json())
            .then(data => {
                datosServidor = data;
                document.getElementById('sugerencias').innerHTML = data.productos.map(p => `<option value="${p}">`).join('');
                document.getElementById('caja-total-dia').innerText = `Total: $${data.totalHoy.toLocaleString()}`;
            });
        }

        function agregarAlCarrito() {
            const p = document.getElementById('producto');
            const pr = document.getElementById('precio');
            if (p.value && pr.value) {
                // Generamos un ID de venta basado en el tiempo actual para agrupar
                carrito.push({ 
                    producto: p.value, 
                    precio: parseInt(pr.value),
                    idVenta: "V-" + new Date().getTime() 
                });
                actualizarVista();
                p.value = ""; pr.value = ""; p.focus();
            }
        }

        function actualizarVista() {
            const lista = document.getElementById('lista-actual');
            lista.innerHTML = carrito.map(i => `<div class="item-actual" style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);"><span>${i.producto}</span><strong>$${i.precio.toLocaleString()}</strong></div>`).join('');
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('txt-total-actual').innerText = `$${total.toLocaleString()}`;
        }

        function verHistorial() {
            document.getElementById('pantalla-historial').style.display = 'block';
            const lista = document.getElementById('lista-ventas-dia');
            
            // LÓGICA DE AGRUPACIÓN POR HORA (Consideramos una "venta" productos que comparten la misma hora exacta)
            const grupos = {};
            datosServidor.detalleHoy.forEach(v => {
                const llave = v.hora; // Agrupamos por hora
                if (!grupos[llave]) grupos[llave] = { hora: v.hora, items: [], total: 0 };
                grupos[llave].items.push(v);
                grupos[llave].total += v.precio;
            });

            const html = Object.values(grupos).reverse().map(g => `
                <div class="grupo-venta-card">
                    <div class="grupo-header">
                        <span>🕒 Venta de las ${g.hora}</span>
                        <span>${g.items.length} prod.</span>
                    </div>
                    ${g.items.map(item => `
                        <div class="grupo-item">
                            <span>${item.nombre}</span>
                            <span>$${item.precio.toLocaleString()}</span>
                        </div>
                    `).join('')}
                    <div class="grupo-total">Total: $${g.total.toLocaleString()}</div>
                </div>
            `).join('');
            
            lista.innerHTML = html || "<p style='text-align:center;'>No hay ventas hoy</p>";
        }

        function cerrarHistorial() { document.getElementById('pantalla-historial').style.display = 'none'; }

        function cerrarVenta() {
            if (carrito.length === 0) return;
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "⏳ Guardando...";
            // Al enviar, todos los productos del carrito se guardan con la misma estampa de tiempo en el servidor
            fetch(urlScript, { method: "POST", mode: "no-cors", body: JSON.stringify(carrito) })
            .then(() => setTimeout(() => location.reload(), 1000));
        }
    </script>
</body>
</html>
